name: ChaosGuard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    # Add services for database and redis so tests pass
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chaosguard
          POSTGRES_PASSWORD: chaosguard
          POSTGRES_DB: chaosguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build server
        run: go build -v ./cmd/server

      - name: Build agent
        run: go build -v ./cmd/agent

      - name: Run tests (with database)
        env:
          DATABASE_URL: postgres://chaosguard:chaosguard@localhost:5432/chaosguard?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: go test -v -race -count=1 ./...

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build server image
        run: docker build -f Dockerfile.server -t chaosguard-server:test .
